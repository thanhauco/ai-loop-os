services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_loop_os
      POSTGRES_USER: ai_loop_os
      POSTGRES_PASSWORD: ai_loop_os_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_loop_os -d ai_loop_os"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/ai-loop-os-dev
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs

  qdrant:
    image: qdrant/qdrant:v1.12.5
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    environment:
      PORT: 4000
      DATA_DIR: /data
      DATABASE_URL: postgresql://ai_loop_os:ai_loop_os_dev@postgres:5432/ai_loop_os
    ports:
      - "4000:4000"
    volumes:
      - api-data:/data
    depends_on:
      postgres:
        condition: service_healthy

  gateway:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.gateway
    environment:
      GATEWAY_PORT: 4100
      API_BASE_URL: http://api:4000
    ports:
      - "4100:4100"
    depends_on:
      - api

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../../observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - api

  grafana:
    image: grafana/grafana:11.3.1
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ai-loop-os-dev
    ports:
      - "3000:3000"
    volumes:
      - ../../observability/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  api-data:
  postgres-data:
  neo4j-data:
  neo4j-logs:
  qdrant-data:
  prometheus-data:
  grafana-data:
