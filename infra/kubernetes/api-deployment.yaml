apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-loop-os-api
  namespace: ai-loop-os
  labels:
    app.kubernetes.io/name: ai-loop-os
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-loop-os
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-loop-os
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: ghcr.io/your-org/ai-loop-os-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
              name: http
          envFrom:
            - configMapRef:
                name: ai-loop-os-config
            - secretRef:
                name: ai-loop-os-secrets
                optional: true
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: api-data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: api-data
          persistentVolumeClaim:
            claimName: ai-loop-os-api-data
