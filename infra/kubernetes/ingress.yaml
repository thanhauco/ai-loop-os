apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-loop-os
  namespace: ai-loop-os
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  rules:
    - host: ai-loop-os.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ai-loop-os-gateway
                port:
                  name: http
